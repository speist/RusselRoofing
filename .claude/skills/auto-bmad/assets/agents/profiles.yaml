# Default delegate profiles for auto-bmad.
#
# Each profile carries:
#   * tool-neutral persona strings (description / role_blurb / status_example),
#     used to render the SAME wording into the Claude, Codex AND opencode agent
#     files — this is where every per-profile difference lives, so the three tools'
#     output cannot drift;
#   * per-tool model + effort, used to fill in the tool-native frontmatter
#     (and read directly by scripts/cli_delegate.py when a phase is routed to an
#     external CLI via delegation.cli_phases — the claude/codex/opencode block picks
#     the model + --effort / model_reasoning_effort / --variant for that
#     `claude -p` / `codex exec` / `opencode run`).
#
# `scripts/render-agents.py` reads this file (or the `profiles:` block of the
# runtime config) and writes the tool-native delegate definitions from ONE
# shared body template per tool:
#   - Claude Code -> .claude/agents/<name>.md    (frontmatter `model:` / `effort:`)
#   - Codex       -> .codex/agents/<name>.toml   (`model` / `model_reasoning_effort`)
#   - opencode    -> .opencode/agent/<name>.md   (frontmatter `model:`; model-only — no effort)
#
# To retune: copy this block into {output_folder}/auto-bmad/config.yaml, edit it,
# and run `/auto-bmad reprovision`. Keep the BLOCK style shown here (two-space
# nesting) — the renderer's dependency-free parser expects it.
#
# You may also ADD custom profiles to that config copy (e.g. `ab-ultradeep`):
# same field set as the shipped ones, and the name MUST start with `ab-` (the
# renderer skips other names — only ab-* agent files are tracked for freshness/
# cleanup). Point phase_profiles entries at the new name and run
# `/auto-bmad reprovision`. Note: `/auto-bmad reset-defaults` with a whole-block
# scope prunes custom profiles (they're not in this asset); a single-profile
# scope leaves them intact.
#
# Codex reasoning effort (gpt-5.x) is one of: low | medium | high | xhigh — xhigh
# is the ceiling (older GPT-5 also exposed minimal/none). Claude effort is one of:
# low | medium | high | xhigh | max (set via the sub-agent `effort:` frontmatter).
# Model names are environment-specific — retune above if your Codex install differs.
#
# opencode is multi-provider: each profile's `opencode.model` is a `provider/model`
# string (e.g. anthropic/claude-opus-4-5, openrouter/qwen/...). It ships BLANK so the
# rendered agent inherits your opencode default model; agent files carry NO effort
# (opencode's reasoning knob is provider-specific — set it per-agent-name in
# opencode.json). The optional `opencode.variant` is read ONLY by the cli_phases route
# (`opencode run --variant high|max|minimal`), never written into an agent file.
profiles:
  ab-deep:
    description: "auto-bmad delegate for the highest-stakes, deep-reasoning steps: implementing story code (`dev-story`), building the story context file (`create-story`), primary adversarial code review, and the epic-level test design + release gates (trace/NFR/test-review). Invoked by the auto-bmad orchestrator; not meant for direct use."
    role_blurb: "the highest-stakes, deep-reasoning work: implementing story code (`dev-story`), building the comprehensive story context file (`create-story`), running adversarial primary code review, and the epic-level test design + release gates (trace / NFR / test-review). Be exhaustive and skeptical — correctness matters more than speed: reason hard about edge cases, regressions, and acceptance criteria, because these steps determine whether everything downstream succeeds and the gates decide whether the epic ships."
    status_example: "for dev-story — any status/state the skill set (e.g. story moved to `review`) and test results; for create-story — the story key, path, and final status; for reviews — the verdict (Approve / Changes Requested / Blocked) and Critical/High/Med/Low finding counts; for gate skills — the gate decision (PASS / CONCERNS / FAIL / WAIVED) and rationale"
    claude:
      model: opus
      effort: xhigh
    codex:
      model: gpt-5.5
      reasoning_effort: xhigh
    opencode:
      model: ""        # provider/model, e.g. anthropic/claude-opus-4-5. BLANK => inherit your opencode
                       # default model. Agent files are model-only — opencode has no portable per-agent
                       # effort knob; set reasoning per-agent-name in opencode.json if you want it tuned.
      variant: ""      # OPTIONAL, cli_phases route ONLY: --variant high|max|minimal. BLANK => model default.

  ab-standard:
    description: "auto-bmad delegate for substantive, well-scoped steps: applying the primary code-review fixes (`code-review` fix pass) plus test- and context-infrastructure work — per-story test authoring (`testarch-atdd` scaffolds, `testarch-automate` coverage), one-time test-framework/CI setup, and building/refreshing `project-context.md`. Invoked by the auto-bmad orchestrator; not meant for direct use."
    role_blurb: "substantive, well-scoped work: applying the fixes from the primary adversarial code review (the findings are already identified — implement them faithfully and re-verify), plus test- and context-infrastructure work — per-story test authoring (ATDD red-phase acceptance scaffolds and expanding automated coverage), the one-time test-framework + CI-pipeline setup, and building or refreshing `project-context.md`, the durable AI-rules doc every later story inherits. These are judgment-heavy — answer every interactive prompt yourself using the provided context and sensible judgment, and produce the complete output document."
    status_example: "for code-review fixes — which findings were resolved; for test authoring/setup — tests or framework/CI scaffolded, whether they pass, coverage expanded; for project-context — the file written/refreshed and the key facts captured"
    claude:
      model: opus
      effort: high
    codex:
      model: gpt-5.5
      reasoning_effort: high
    opencode:
      model: ""        # provider/model, e.g. anthropic/claude-opus-4-5. BLANK => inherit your opencode
                       # default model. Agent files are model-only (no portable per-agent effort knob).
      variant: ""      # OPTIONAL, cli_phases route ONLY: --variant high|max|minimal. BLANK => model default.

  ab-alt-deep:
    description: "auto-bmad delegate for the parallel second-opinion code review (for model diversity): a second, independent adversarial reviewer running its own review lenses on the same diff alongside the primary, at full reasoning depth. Invoked by the auto-bmad orchestrator; not meant for direct use."
    role_blurb: "the diversity-oriented adversarial work: running the second-opinion review lenses in parallel with the primary reviewer to give the review loop model diversity. Be exhaustive and skeptical — you are a second, independent pair of eyes on the same diff, run at full reasoning depth precisely to catch what the primary reviewer's model missed."
    status_example: "the verdict (Approve / Changes Requested / Blocked) and Critical/High/Med/Low finding counts"
    claude:
      model: sonnet
      effort: xhigh
    codex:
      model: gpt-5.4
      reasoning_effort: xhigh
    opencode:
      model: ""        # provider/model. BLANK => inherit your opencode default. For the alt profiles,
                       # point this at a DIFFERENT vendor than ab-deep (e.g. a DeepSeek/Qwen/Gemini
                       # model) to get a genuine cross-model second opinion no single-vendor host can.
      variant: ""      # OPTIONAL, cli_phases route ONLY: --variant high|max|minimal. BLANK => model default.

  ab-alt-standard:
    description: "auto-bmad delegate for lighter-weight steps on a faster model: per-story risk triage and the epic retrospective. Invoked by the auto-bmad orchestrator; not meant for direct use."
    role_blurb: "the lighter-weight work: classifying per-story test risk (triage) and synthesizing the epic retrospective from accumulated notes."
    status_example: "for triage — the risk level (low/med/high) and selected TEA set; for the retrospective — key action items and any next-epic prep flagged"
    claude:
      model: sonnet
      effort: high     # rubric-driven classification + note synthesis
    codex:
      model: gpt-5.4
      reasoning_effort: high
    opencode:
      model: ""        # provider/model. BLANK => inherit your opencode default. For the alt profiles,
                       # point this at a DIFFERENT vendor than ab-deep for cross-model diversity.
      variant: ""      # OPTIONAL, cli_phases route ONLY: --variant high|max|minimal. BLANK => model default.

  ab-security:
    description: "auto-bmad delegate for the dedicated per-story security review: an adversarial security reviewer that hunts exploitable vulnerabilities in the story's diff (injection, auth/authz, crypto & secrets, insecure deserialization, sensitive-data exposure), applying a high-signal exclusion list so non-exploitable noise is suppressed. Invoked by the auto-bmad orchestrator; not meant for direct use."
    role_blurb: "the dedicated per-story security review: hunting exploitable security vulnerabilities introduced or exposed by the story's diff — injection (SQL/command/template/SSRF/path traversal), authentication & authorization flaws, crypto & secret mishandling, insecure deserialization, and sensitive-data exposure. Be concrete and adversarial, but high-signal: report ONLY findings with a real, reachable exploit path; assign each a severity (HIGH directly exploitable / MEDIUM exploitable under conditions / LOW defense-in-depth); and suppress the standard non-exploitable noise (DoS, rate-limiting, resource/CPU exhaustion, validation of non-security-critical fields with no proven problem)."
    status_example: "the output-file path you wrote and the count of findings by severity (HIGH / MEDIUM / LOW) — never the findings text (the triage delegate reads the file)"
    claude:
      model: opus
      effort: xhigh
    codex:
      model: gpt-5.5
      reasoning_effort: xhigh
    opencode:
      model: ""        # provider/model, e.g. anthropic/claude-opus-4-5. BLANK => inherit your opencode
                       # default model. Agent files are model-only (no portable per-agent effort knob).
      variant: ""      # OPTIONAL, cli_phases route ONLY: --variant high|max|minimal. BLANK => model default.

# Phase -> profile mapping. This is the SINGLE source of the phase->profile
# binding: pipeline.md / delegation.md name these keys, never raw profile names.
# `render-agents.py` only reads the `profiles:` block above and ignores this one
# (its parser stops at the next top-level key), so editing here is renderer-safe.
# Copied alongside `profiles` into config.yaml at first run; retune there.
phase_profiles:
  create_story: ab-deep
  dev_story: ab-deep                        # highest-stakes coding step
  code_review_review: ab-deep               # primary reviewer — always runs; its 3 lenses + the single triage delegate
  code_review_review_secondary: ab-alt-deep # OPTIONAL second parallel reviewer (3 more lenses per pass); blank "" => disabled
  code_review_review_tertiary: ""           # OPTIONAL third parallel reviewer; blank "" => disabled (name a profile to enable)
  code_review_security: ab-security         # dedicated per-story security review (auto-bmad-local; gated by code_review.security_review); blank "" => falls back to the code_review_review (primary) profile
  code_review_fix: ab-standard              # apply already-identified findings (mechanical vs the hunt)
  tea_triage: ab-alt-standard               # Phase 0 story-risk classification (cheap)
  tea_per_story: ab-standard                # Phase 4 ATDD, Phase 6 automate
  tea_epic: ab-deep                         # Phase 2 epic test design, Phase 8 blocking trace gate (+ its remediation)
  tea_epic_audit: ab-standard               # Phase 8 advisory gates (nfr + test-review) — one effort tier below the blocking trace gate
  retrospective: ab-alt-standard
  project_context: ab-standard              # Phase 2 bootstrap + Phase 8 refresh
  deferred_reconcile: ab-standard           # Phase 8 (epic-end, pre-archive): verify-against-code which unmarked/partial deferred items are now fully resolved and mark them; reuses ab-standard like the sibling project_context step (no new agent file)
  uat: ab-standard                          # Phase 9 head (per story) + epic E5 per story + the E_final single-session consolidation: read-only manual UAT checklist for the report (auto-bmad-local). Reuses ab-standard like project_context (no new agent file)
